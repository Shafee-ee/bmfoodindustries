<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Available Stores | BM Organics</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>

  <body class="bg-[#efe3d6] min-h-screen overflow-x-hidden">
    <main
      class="max-w-[430px] mx-auto min-h-screen px-5 py-10 bg-cover bg-top bg-no-repeat shadow-[0_0_40px_rgba(0,0,0,0.06)]"
      style="background-image: url(&quot;images/links/background.png&quot;)"
    >
      <!-- LOGO -->

      <img
        src="images/logo/logo.png"
        class="w-[90px] h-[90px] object-contain mx-auto rounded-full bg-white p-2 shadow-xl"
      />

      <!-- TITLE -->

      <h1 class="text-center text-[34px] font-extrabold text-[#0f5c2c] mt-5">
        Available Stores 📍
      </h1>

      <p class="text-center text-[16px] text-[#333] mt-3 leading-relaxed">
        Find Fruit Bites at selected stores in Mangalore.
      </p>

      <!-- STORES -->

      <div class="flex flex-col gap-5 mt-10">
        <!-- STORE 1 -->

        <div
          class="bg-[#ddeedb] rounded-[28px] p-5 shadow-[0_12px_30px_rgba(0,0,0,0.08)]"
        >
          <h3 class="text-[22px] font-bold text-[#111]">Misbah Supermarket</h3>

          <p class="text-[14px] text-[#333] mt-2 leading-relaxed">
            Marnamikatte, Mangalore
          </p>

          <a
            href="https://share.google/kyQ4W2DpLklAmAUem"
            target="_blank"
            class="inline-block mt-5 bg-[#0f5c2c] text-white px-5 py-3 rounded-full text-[14px] font-semibold transition duration-300 hover:scale-105"
          >
            Open in Maps
          </a>
        </div>

        <!-- STORE 2 -->

        <div
          class="bg-[#f8d6dc] rounded-[28px] p-5 shadow-[0_12px_30px_rgba(0,0,0,0.08)]"
        >
          <h3 class="text-[22px] font-bold text-[#111]">Misbah Supermarket</h3>

          <p class="text-[14px] text-[#333] mt-2 leading-relaxed">
            Falnir Road, Mangalore
          </p>

          <a
            href="https://share.google/K8dNArkNC2vpJkiLy"
            target="_blank"
            class="inline-block mt-5 bg-[#0f5c2c] text-white px-5 py-3 rounded-full text-[14px] font-semibold transition duration-300 hover:scale-105"
          >
            Open in Maps
          </a>
        </div>

        <!-- STORE 3 -->

        <div
          class="bg-[#ede2f8] rounded-[28px] p-5 shadow-[0_12px_30px_rgba(0,0,0,0.08)]"
        >
          <h3 class="text-[22px] font-bold text-[#111]">Store Location</h3>

          <p class="text-[14px] text-[#333] mt-2 leading-relaxed">Mangalore</p>

          <a
            href="https://share.google/PtoHlPs3AUb8Y67U8"
            target="_blank"
            class="inline-block mt-5 bg-[#0f5c2c] text-white px-5 py-3 rounded-full text-[14px] font-semibold transition duration-300 hover:scale-105"
          >
            Open in Maps
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
