<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>BM Organics | Links</title>

    <!-- TAILWIND -->

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FONT -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>

  <body class="bg-[#efe3d6] overflow-x-hidden min-h-screen">
    <!-- BACKGROUND FRUITS -->

    <main
      class="relative z-10 max-w-[430px] mx-auto min-h-screen px-4 py-10 bg-cover bg-top bg-no-repeat bg-[url('/images/links/background.png')]"
    >
      <!-- LOGO -->

      <img
        src="images/logo/logo.png"
        class="w-[100px] h-[100px] object-contain mx-auto rounded-full bg-white p-2 shadow-xl"
      />

      <!-- TITLE -->

      <h1
        class="text-center text-[38px] leading-tight font-extrabold text-[#0f5c2c] mt-5"
      >
        Fruit Bites 🍓
      </h1>

      <p class="text-center text-[18px] font-medium text-[#222] mt-2">
        Freeze-Dried Fruit Snacks
      </p>

      <p class="text-center text-[24px] font-semibold text-[#f06d86] mt-3">
        Just Fruit. Nothing Else.
      </p>

      <!-- BADGES -->

      <div class="flex flex-wrap justify-center gap-4 mt-7">
        <div class="text-[13px] font-medium text-[#222]">
          🍃 100% Real Fruit
        </div>

        <div class="text-[13px] font-medium text-[#222]">❌ No Added Sugar</div>

        <div class="text-[13px] font-medium text-[#222]">
          🌱 Nothing Artificial
        </div>
      </div>

      <!-- CARDS -->

      <div class="flex flex-col gap-5 mt-8">
        <a
          href="https://wa.me/919901919978"
          target="_blank"
          class="block transition duration-300 hover:-translate-y-1"
        >
          <img
            src="images/links/contact-whatsapp.png"
            class="w-full rounded-[28px] shadow-[0_12px_30px_rgba(0,0,0,0.08)]"
          />
        </a>

        <a href="#" class="block transition duration-300 hover:-translate-y-1">
          <img
            src="images/links/meesho.png"
            class="w-full rounded-[28px] shadow-[0_12px_30px_rgba(0,0,0,0.08)]"
          />
        </a>

        <a href="#" class="block transition duration-300 hover:-translate-y-1">
          <img
            src="images/links/whatarefrutbites.png"
            class="w-full rounded-[28px] shadow-[0_12px_30px_rgba(0,0,0,0.08)]"
          />
        </a>

        <a href="#" class="block transition duration-300 hover:-translate-y-1">
          <img
            src="images/links/findus.png"
            class="w-full rounded-[28px] shadow-[0_12px_30px_rgba(0,0,0,0.08)]"
          />
        </a>

        <a href="#" class="block transition duration-300 hover:-translate-y-1">
          <img
            src="images/links/explore.png"
            class="w-full rounded-[28px] shadow-[0_12px_30px_rgba(0,0,0,0.08)]"
          />
        </a>
      </div>

      <!-- INSTAGRAM -->

      <div class="mt-10 text-center">
        <p class="text-[20px] font-semibold text-[#222] mb-5">
          Follow us on Instagram
        </p>

        <a
          href="https://instagram.com/"
          target="_blank"
          class="w-[72px] h-[72px] rounded-full bg-white flex items-center justify-center mx-auto shadow-xl transition duration-300 hover:scale-105"
        >
          <img src="/images/links/instagram-icon.png" class="w-[42px]" />
        </a>
      </div>
    </main>
  </body>
</html>
